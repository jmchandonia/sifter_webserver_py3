 <div class="alert alert-danger {%if not form.input_sequence.errors %} hidden {% endif %}">{{ form.input_sequence.errors }}</div>
<div class="form-group {%if form.input_sequence.errors %} has-error {% endif %}" >
  <fieldset >
    
  <h3>Enter query sequences </h3>
  <div>Paste or upload the set of your protein sequences in FASTA format</div>
  <div class="row">
    <div class="col-md-11">
      <div class="text-right">
      <a id="example7" class="sample" href="javascript:setExample(7)">Example 1</a>
      <a id="example8" class="sample" href="javascript:setExample(8)">Example 2</a>
      </div>
      {{form.input_sequence}}
      <div class="row">
	<div class="col-md-9">
	- OR - <label for="sequence_uploader">Upload the set of your protein sequences in a FASTA format file:</label>
	</div>
	<div class="col-md-3">
	  <div class="text-right"><a id="clear_text_sequence" href="javascript:void(0)" title="clear_text_sequence">Clear</a></div>
	</div>
      </div>
      {{form.query_uploader}}
    </div>
  </div>
</fieldset>
</div>
