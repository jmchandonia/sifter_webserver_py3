<VirtualHost *:80>
    ServerName sifter.berkeley.edu

    ProxyPreserveHost On
    ProxyPass /static/ !
    ProxyPass /media/ !
    ProxyPass /downloads/ !
    ProxyPass / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/

    Alias /static/ /srv/sifter/static/
    Alias /media/ /srv/sifter/data/media/
    Alias /downloads/ /srv/sifter/data/output/

    <Directory /srv/sifter/static/>
        Require all granted
    </Directory>

    <Directory /srv/sifter/data/media/>
        Require all granted
    </Directory>

    <Directory /srv/sifter/data/output/>
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/sifter-error.log
    CustomLog ${APACHE_LOG_DIR}/sifter-access.log combined
</VirtualHost>
